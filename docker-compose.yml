services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"

  qr-worker:
    build:
      context: ./qr-service
    ports:
      - "18000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - METRICS_PORT=8000
    depends_on:
      - rabbitmq

  gateway:
    build:
      context: ./gateway
    ports:
      - "15000:5000"
    environment:
      - FLASK_ENV=development
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway
