name: ci-devsecops

on:
  push:
    branches:
      - main

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gateway test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt pytest-cov

      - name: Run gateway tests
        working-directory: gateway
        run: |
          pytest test_app.py

      - name: Install QR worker test dependencies
        run: |
          pip install -r qr-service/requirements.txt pytest-cov

      - name: Run QR worker tests
        working-directory: qr-service
        run: |
          pytest test_app.py


  security:
    name: security-scans
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]"

      - name: Run Bandit on Python services
        run: bandit -r gateway qr-service -ll

      - name: Run Gitleaks on git history
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            git /repo --verbose

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
