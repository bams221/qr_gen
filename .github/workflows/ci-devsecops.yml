name: ci-devsecops

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gateway test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt

      - name: Run gateway tests with coverage
        working-directory: gateway
        run: |
          pytest test_app.py

      - name: Install QR worker test dependencies
        run: |
          pip install -r qr-service/requirements.txt

      - name: Run QR worker tests with coverage
        working-directory: qr-service
        run: |
          pytest test_app.py

