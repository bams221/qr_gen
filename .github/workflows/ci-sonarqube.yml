name: Test and SonarQube

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - ".github/workflows/**"
      - "gateway/**"
      - "qr-service/**"
      - "frontend/**"
      - "sonar-project.properties"
      - "pytest.ini"

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gateway test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt pytest-cov

      - name: Run gateway tests with coverage
        working-directory: gateway
        run: |
          pytest test_app.py --cov=app --cov-report=xml:coverage.xml

      - name: Install QR worker test dependencies
        run: |
          pip install -r qr-service/requirements.txt pytest-cov

      - name: Run QR worker tests with coverage
        working-directory: qr-service
        run: |
          pytest test_app.py --cov=app --cov-report=xml:coverage.xml

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
